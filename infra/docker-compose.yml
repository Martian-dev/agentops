services:
  postgres:
    image: postgres:16
    container_name: agentops-postgres
    environment:
      POSTGRES_DB: agentops
      POSTGRES_USER: agentops
      POSTGRES_PASSWORD: agentops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentops"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-migrate:
    image: migrate/migrate
    container_name: agentops-db-migrate
    volumes:
      - ../backend/migrations:/migrations
    command: -path /migrations -database "postgres://agentops:agentops@postgres:5432/agentops?sslmode=disable" up
    environment:
      DATABASE_URL: postgres://agentops:agentops@postgres:5432/agentops?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default

  qdrant:
    image: qdrant/qdrant:latest
    container_name: agentops-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: agentops-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: agentops-backend
    env_file:
      - .env
    depends_on:
      - postgres
      - db-migrate
      - qdrant
      - redis
    environment:
      DATABASE_URL: postgres://agentops:agentops@postgres:5432/agentops?sslmode=disable
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  qdrant_data:
  redis_data:

